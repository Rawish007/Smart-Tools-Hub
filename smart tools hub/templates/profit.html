<!DOCTYPE html>
<html>
<head>
  <title>Profit Calculator</title>
</head>
<body>
  <h1>Profit Calculator</h1>

  <input type="number" id="buy" placeholder="Buy Price"><br><br>
  <input type="number" id="sell" placeholder="Sell Price"><br><br>
  <input type="number" id="qty" placeholder="Quantity"><br><br>

  <button onclick="calc()">Calculate</button>

  <h2 id="result"></h2>

  <script>
    function calc(){
      let buy = document.getElementById("buy").value;
      let sell = document.getElementById("sell").value;
      let qty = document.getElementById("qty").value;

      let profit = (sell - buy) * qty;
      document.getElementById("result").innerText = "Profit: " + profit;
    }
  </script>
</body>
</html>
