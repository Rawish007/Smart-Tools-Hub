<!DOCTYPE html>
<html>
<head>
<title>Smart Tools Hub</title>

<meta name="description" content="Free online tools">
<meta name="keywords" content="tools, calculator, converter">

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#fff;
    color:#111;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    border-bottom:1px solid #ddd;
}

.logo {
    font-weight:600;
    font-size:18px;
}

/* HERO */
.hero {
    text-align:center;
    padding:40px 20px;
}

.hero h1 {
    font-size:28px;
    margin-bottom:10px;
}

.hero p {
    color:#555;
}

/* SEARCH */
.search-box {
    margin-top:20px;
}

.search-box input {
    padding:12px;
    width:80%;
    max-width:320px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
}

/* TOOLS GRID */
.tools {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:20px;
    max-width:900px;
    margin:auto;
}

/* CARD */
.card {
    border:1px solid #ddd;
    padding:15px;
    border-radius:8px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h4 {
    margin-bottom:10px;
}

.card a {
    display:block;
    padding:10px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:5px;
    font-size:14px;
}

.card a:hover {
    background:#333;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Smart Tools Hub</div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>All-in-One Smart Tools</h1>
    <p>Fast • Simple • Free Tools</p>

    <div class="search-box">
        <input type="text" id="search" onkeyup="searchTools()" placeholder="Search tools...">
    </div>
</div>

<!-- TOOLS -->
<div class="tools">

<div class="card">
<h4>Profit Calculator</h4>
<a href="/profit">Open Tool</a>
</div>

<div class="card">
<h4>Currency Converter</h4>
<a href="/currency">Open Tool</a>
</div>

<div class="card">
<h4>Unit Converter</h4>
<a href="/unit">Open Tool</a>
</div>

<div class="card">
<h4>Loan Calculator</h4>
<a href="/loan">Open Tool</a>
</div>

<div class="card">
<h4>Image Compressor</h4>
<a href="/image-compressor">Open Tool</a>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Smart Tools Hub
</div>

<script>
function searchTools() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let text = cards[i].innerText.toLowerCase();
        cards[i].style.display = text.includes(input) ? "block" : "none";
    }
}
</script>

</body>
</html>
