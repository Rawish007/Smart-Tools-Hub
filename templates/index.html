<!DOCTYPE html>
<html>
<head>
<title>Smart Tools Hub - Free Online Tools</title>

<meta name="description" content="Free online tools like calculator, converter, image compressor">
<meta name="keywords" content="free tools, calculator, converter">

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.3);
}

.hero {
    text-align:center;
    padding:30px;
}

input {
    padding:10px;
    width:80%;
    max-width:300px;
}

.tools {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.card {
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
}

.card a {
    display:block;
    margin-top:10px;
    padding:8px;
    background:blue;
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="navbar">
    <div>🚀 Smart Tools Hub</div>
</div>

<div class="hero">
<h1>All-in-One Smart Tools</h1>
<input type="text" id="search" onkeyup="searchTools()" placeholder="Search tools...">
</div>

<div class="tools">

<div class="card"><h4>Profit Calculator</h4><a href="/profit">Open</a></div>
<div class="card"><h4>Currency Converter</h4><a href="/currency">Open</a></div>
<div class="card"><h4>Unit Converter</h4><a href="/unit">Open</a></div>
<div class="card"><h4>Loan Calculator</h4><a href="/loan">Open</a></div>
<div class="card"><h4>Image Compressor</h4><a href="/image-compressor">Open</a></div>

</div>

<script>
function searchTools(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("card");

for(let i=0;i<cards.length;i++){
let text=cards[i].innerText.toLowerCase();
cards[i].style.display=text.includes(input)?"block":"none";
}
}
</script>

</body>
</html>
